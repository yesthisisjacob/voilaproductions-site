<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Men's Production — Voila Productions</title>
  <meta name="description" content="Professional photography and production for men. Dating apps, Instagram, personal brands. Directed, lit, and produced by Voila Productions.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="container">
    <div class="service-header">
      <a href="index.html" class="back-link">← Home</a>
      <a href="index.html" class="brand-small">Voila Productions</a>
      <a href="contact.html" class="contact-link">Contact</a>
    </div>
  </header>

  <!-- Hero -->
  <section class="service-hero fade-in">
    <div class="container">
      <h1>Men's Production</h1>
      <p class="tagline">Professional direction, framing, and lighting — crafted to elevate your personal brand, dating profile, or social presence.</p>
    </div>
  </section>

  <!-- Gallery -->
  <section class="gallery-section">
    <div class="container">
      <div class="gallery-grid">
        <div class="gallery-item fade-in"><img src="images/men/men-1.jpg" alt="Men's production — rooftop lounge portrait"></div>
        <div class="gallery-item fade-in"><img src="images/men/men-2.jpg" alt="Men's production — resort lifestyle"></div>
        <div class="gallery-item fade-in"><img src="images/men/men-3.jpg" alt="Men's production — blazer editorial"></div>
        <div class="gallery-item fade-in"><img src="images/men/men-4.jpg" alt="Men's production — lounge setting"></div>
        <div class="gallery-item fade-in"><img src="images/men/men-5.jpg" alt="Men's production — poolside portrait"></div>
        <div class="gallery-item fade-in"><img src="images/men/men-6.JPG" alt="Men's production — lifestyle portrait"></div>
      </div>
    </div>
  </section>


  <!-- CTA -->
  <section class="cta-section fade-in" id="contact-cta">
    <h2>Ready to book a session?</h2>
    <a href="contact.html" class="cta-button">Book a Session</a>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Voila Productions</p>
    </div>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" aria-label="Close lightbox">✕</button>
    <img src="" alt="Enlarged photo">
  </div>

  <script src="js/main.js"></script>
</body>
</html>
